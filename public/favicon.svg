<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="WorldCupX">
  <rect width="100" height="100" rx="22" fill="#0B0B0D"/>
  <!-- Anillo C exterior (white): gap tilted upper-right (~1 a ~4 en punto) -->
  <path d="M 59 15 A 36 36 0 1 0 82 67" fill="none" stroke="#F5F4F1" stroke-width="7" stroke-linecap="round"/>
  <!-- Anillo C interior (medium gray): mismo eje, más chico -->
  <path d="M 55 32 A 20 20 0 1 0 67 60" fill="none" stroke="#5A5D62" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Núcleo blanco -->
  <circle cx="50" cy="50" r="8" fill="#F5F4F1"/>
  <!-- Satélite blanco arriba-izquierda -->
  <circle cx="35" cy="35" r="4" fill="#F5F4F1"/>
  <!-- Satélite slate al final del arco exterior (esquina inferior-derecha) -->
  <circle cx="78" cy="66" r="4.2" fill="#5C6F89"/>
</svg>
